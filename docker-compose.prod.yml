version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: timebridge-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      default:
        ipv4_address: 172.30.0.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: timebridge-cache
    restart: always
    volumes:
      - redis_data:/data
    networks:
      default:
        ipv4_address: 172.30.0.3
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: backend
      dockerfile: Dockerfile.prod
    container_name: timebridge-api
    restart: always
    env_file: backend/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    extra_hosts:
      - "postgres:172.30.0.2"
      - "redis:172.30.0.3"
    ports:
      - "8000:80"
    networks:
      default:
        ipv4_address: 172.30.0.4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.prod
    container_name: timebridge-web
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - PORT=3001
      - HOSTNAME=0.0.0.0
    ports:
      - "3001:3001"
    networks:
      default:
        ipv4_address: 172.30.0.5
    depends_on:
      - backend


volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: timebridge-network
    ipam:
      config:
        - subnet: 172.30.0.0/16
