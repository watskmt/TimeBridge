services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: timebridge-db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-timebridge}
      POSTGRES_USER: ${DB_USERNAME:-timebridge_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-local_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timebridge_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: timebridge-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel API Backend
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: timebridge-api
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-timebridge}
      - DB_USERNAME=${DB_USERNAME:-timebridge_user}
      - DB_PASSWORD=${DB_PASSWORD:-local_dev_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/vendor
      - /app/bootstrap/cache
      - /app/storage
    command: >
      sh -c "php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  # Next.js Frontend
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: timebridge-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  # Mailpit (Email Testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: timebridge-mail
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: timebridge-network
