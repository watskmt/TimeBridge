name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: timebridge_test
          POSTGRES_USER: timebridge_user
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: pdo, pdo_pgsql, redis
        coverage: xdebug

    - name: Install dependencies
      working-directory: ./backend
      run: composer install --no-interaction --prefer-dist

    - name: Copy .env
      working-directory: ./backend
      run: |
        cp .env.example .env
        php artisan key:generate

    - name: Setup Database
      working-directory: ./backend
      env:
        DB_HOST: localhost
        DB_DATABASE: timebridge_test
        DB_USERNAME: timebridge_user
        DB_PASSWORD: password
        REDIS_HOST: localhost
      run: |
        php artisan migrate --env=testing
        php artisan db:seed --env=testing

    - name: Run PHP Linter
      working-directory: ./backend
      run: |
        composer lint

    - name: Run Tests
      working-directory: ./backend
      env:
        DB_HOST: localhost
        DB_DATABASE: timebridge_test
        DB_USERNAME: timebridge_user
        DB_PASSWORD: password
        REDIS_HOST: localhost
      run: |
        php artisan test

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./backend/coverage.xml
        flags: backend
        name: backend-coverage

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Install dependencies
      working-directory: ./backend
      run: composer install --no-interaction --prefer-dist

    - name: Run PHP CodeSniffer
      working-directory: ./backend
      run: |
        composer run-script lint

    - name: Run PHPStan
      working-directory: ./backend
      run: |
        composer run-script analyze || true
