name: Deploy to WebArena

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to WebArena VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WEBARENA_HOST }}
          username: ${{ secrets.WEBARENA_USER }}
          key: ${{ secrets.WEBARENA_SSH_KEY }}
          port: ${{ secrets.WEBARENA_PORT || 22 }}
          script: |
            set -e
            cd /opt/timebridge

            echo "=== Pull latest code ==="
            git pull origin main

            echo "=== Copy production .env ==="
            cp /opt/timebridge-secrets/backend.env backend/.env

            echo "=== Build & start containers ==="
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "=== Wait for DB ==="
            sleep 5

            echo "=== Run migrations ==="
            docker compose -f docker-compose.prod.yml exec -T backend php artisan migrate --force

            echo "=== Cache config/routes/views ==="
            docker compose -f docker-compose.prod.yml exec -T backend php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T backend php artisan route:cache
            docker compose -f docker-compose.prod.yml exec -T backend php artisan view:cache

            echo "=== Remove old images ==="
            docker image prune -f

      - name: Health check
        run: |
          sleep 15
          curl -sf "http://${{ secrets.WEBARENA_HOST }}/api/health" \
            -o /dev/null \
            -w "HTTP Status: %{http_code}\n" \
            || (echo "Health check failed" && exit 1)

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deploy succeeded: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Commit: ${{ github.sha }}"
          echo "URL: http://${{ secrets.WEBARENA_HOST }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deploy failed: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Commit: ${{ github.sha }}"
