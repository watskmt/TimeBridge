name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Build Docker images
      run: |
        docker build -t timebridge-api:latest ./backend
        docker build -t timebridge-web:latest ./frontend

    - name: Login to Docker Registry
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker images
      run: |
        docker tag timebridge-api:latest ${{ secrets.DOCKER_REGISTRY }}/timebridge-api:latest
        docker tag timebridge-web:latest ${{ secrets.DOCKER_REGISTRY }}/timebridge-web:latest
        docker push ${{ secrets.DOCKER_REGISTRY }}/timebridge-api:latest
        docker push ${{ secrets.DOCKER_REGISTRY }}/timebridge-web:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          cd /home/timebridge
          
          # Pull latest code
          git pull origin main
          
          # Pull latest Docker images
          docker pull ${{ secrets.DOCKER_REGISTRY }}/timebridge-api:latest
          docker pull ${{ secrets.DOCKER_REGISTRY }}/timebridge-web:latest
          
          # Stop containers
          docker-compose down
          
          # Update docker-compose.yml
          docker-compose pull
          
          # Start new containers
          docker-compose up -d
          
          # Run migrations
          docker-compose exec -T backend php artisan migrate --force
          
          # Clear cache
          docker-compose exec -T backend php artisan config:cache
          docker-compose exec -T backend php artisan route:cache

    - name: Health check
      run: |
        sleep 10
        curl -f http://${{ secrets.VPS_HOST }}/api/health || exit 1

    - name: Slack notification
      if: always()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "TimeBridge Deployment ${{ job.status }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "Deployment to VPS: *${{ job.status }}*\nBranch: main\nCommit: ${{ github.sha }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
